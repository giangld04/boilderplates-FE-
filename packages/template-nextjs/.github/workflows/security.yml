name: Security
on:
  schedule:
    - cron: '0 6 * * 1'
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: latest }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
